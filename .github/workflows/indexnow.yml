name: IndexNow Submit
on:
  push:
    branches: [main]
jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Submit to IndexNow
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "medicalbillreader.com",
              "key": "1af58049462445718b7a9a3fbd66f393",
              "keyLocation": "https://medicalbillreader.com/1af58049462445718b7a9a3fbd66f393.txt",
              "urlList": ["https://medicalbillreader.com/"]
            }')
          echo "IndexNow response: $RESPONSE"
          exit 0
